server:
  port: ${TEMPLATE_SERVICE_PORT:8083}
  servlet:
    context-path: /api/template

spring:
  application:
    name: template-service
  datasource:
    url: ${TEMPLATE_DB_URL:${DB_URL}}
    driverClassName: com.mysql.cj.jdbc.Driver
    username: ${TEMPLATE_DB_USERNAME:${DB_USERNAME}}
    password: ${TEMPLATE_DB_PASSWORD:${DB_PASSWORD}}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        jdbc:
          time_zone: UTC

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

jwt:
  signerKey: ${JWT_SIGNER_KEY}

aws:
  access-key: ${AWS_ACCESS_KEY}
  secret-key: ${AWS_SECRET_KEY}
  region: ${AWS_REGION:ap-southeast-1}
  s3:
    bucket: ${AWS_S3_BUCKET}
