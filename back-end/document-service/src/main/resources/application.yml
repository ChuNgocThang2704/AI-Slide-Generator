server:
  port: ${DOCUMENT_SERVICE_PORT:8082}
  servlet:
    context-path: /api/document

spring:
  application:
    name: document-service
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  datasource:
    url: ${DOC_DB_URL:${DB_URL:jdbc:mysql://localhost:3307/document_service_db?createDatabaseIfNotExist=true}}
    driverClassName: com.mysql.cj.jdbc.Driver
    username: ${DOC_DB_USERNAME:${DB_USERNAME:username}}
    password: ${DOC_DB_PASSWORD:${DB_PASSWORD:password}}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        jdbc:
          time_zone: UTC
          batch_size: 20
        order_inserts: true
        order_updates: true

  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}
      connect-timeout: 5000ms
      timeout: 5000ms

  rabbitmq:
    host: ${RABBIT_HOST}
    port: ${RABBIT_PORT:5671}
    username: ${RABBIT_USER}
    password: ${RABBIT_PASS}
    virtual-host: ${RABBIT_VHOST}
    ssl:
      enabled: ${RABBIT_SSL_ENABLED:true}

jwt:
  signerKey: ${JWT_SIGNER_KEY}

app:
  rabbitmq:
    queue: ${RABBIT_QUEUE:notification_queue}
  ai:
    url: ${AI_URL:http://20.196.129.89:8000}
  subscription-service:
    url: ${APP_SUBSCRIPTION_SERVICE_URL:${SUBSCRIPTION_SERVICE_URL:http://localhost:8084}}

aws:
  access-key: ${AWS_ACCESS_KEY}
  secret-key: ${AWS_SECRET_KEY}
  region: ${AWS_REGION:ap-southeast-1}
  s3:
    bucket: ${AWS_S3_BUCKET}
