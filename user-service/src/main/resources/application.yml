server:
  port: ${USER_PORT:8089}

spring:
  application:
    name: user-service

  datasource:
    url: ${DB_URL}
    driverClassName: org.postgresql.Driver
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC

  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}
      connect-timeout: 5000ms
      timeout: 5000ms
  rabbitmq:
    host: ${RABBIT_HOST}
    port: ${RABBIT_PORT}
    username: ${RABBIT_USER}
    password: ${RABBIT_PASS}
    virtual-host: ${RABBIT_VHOST}
    ssl:
      enabled: true
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

jwt:
  signerKey: ${JWT_SIGNER_KEY}
  valid-duration: ${JWT_VALID_DURATION:3600}
  refreshable-duration: ${JWT_REFRESH_DURATION:36000}

google:
  client-id: ${GOOGLE_CLIENT_ID:}
  client-secret: ${GOOGLE_SECRET:}
  redirect-uri: ${GOOGLE_REDIRECT_URL:}
  user-info-uri: ${USER_INFO_URI:https://www.googleapis.com/oauth2/v3/userinfo}
  token-uri: ${TOKEN_GOOGLE_URI:https://oauth2.googleapis.com/token}
app:
  rabbitmq:
    queue: ${RABBIT_QUEUE:notification_queue}