server:
  port: ${DOCUMENT_PORT:8082}

spring:
  application:
    name: document-service

  datasource:
    url: ${DB_URL}
    driverClassName: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        jdbc:
          time_zone: UTC

  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}
      ssl:
        enabled: true
      connect-timeout: 5000ms
      timeout: 5000ms

jwt:
  signerKey: ${JWT_SIGNER_KEY}

app:
  rabbitmq:
    queue: ${RABBIT_QUEUE:document_queue}
