server:
  port: ${GATEWAY_PORT:8080}

spring:
  application:
    name: api-gateway
  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}
      ssl:
        enabled: true
      connect-timeout: 5000ms
      timeout: 5000ms
  cloud:
    gateway:
      routes:
        # Route cho Authentication
        - id: auth-route
          uri: ${USER_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=1
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20
                key-resolver: "#{@ipKeyResolver}"

        # Route cho Users
        - id: users-route
          uri: ${USER_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/users/**
          filters:
            - StripPrefix=1

        # Route cho Roles/Permissions
        - id: identity-route
          uri: ${USER_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/roles/**, /api/permissions/**
          filters:
            - StripPrefix=1

        # Route cho Document Service
        - id: document-service-route
          uri: ${DOCUMENT_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/document/**
          filters:
            - StripPrefix=1

jwt:
  signerKey: ${JWT_SECRET}