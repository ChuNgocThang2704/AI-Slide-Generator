server:
  port: ${GATEWAY_PORT:8080}

spring:
  application:
    name: api-gateway
  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}
      ssl:
        enabled: true
      connect-timeout: 5000ms
      timeout: 5000ms
  cloud:
    gateway:
      globalcors:
        add-to-chain: true
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            maxAge: 3600
      routes:
        - id: user-service-route
          uri: ${USER_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/users/**, /api/auth/**, /api/roles/**, /api/permissions/**
          filters:
            - StripPrefix=1
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@ipKeyResolver}"
        - id: document-service-route
          uri: ${DOCUMENT_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/document/**
          filters:
            - StripPrefix=1

jwt:
  signerKey: ${JWT_SECRET}