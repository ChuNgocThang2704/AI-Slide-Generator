server:
  port: ${GATEWAY_PORT:8080}

spring:
  application:
    name: api-gateway
  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}
      ssl:
        enabled: true
      connect-timeout: 5000ms
      timeout: 5000ms
  cloud:
    gateway:
      globalcors:
        add-to-chain: true
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            maxAge: 3600
      routes:
        - id: auth-route
          uri: http://${USER_SERVICE_HOST:localhost}:8080
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=1
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20
                key-resolver: "#{@ipKeyResolver}"

        - id: users-route
          uri: http://${USER_SERVICE_HOST:localhost}:8080
          predicates:
            - Path=/api/users/**
          filters:
            - StripPrefix=1

        - id: identity-route
          uri: http://${USER_SERVICE_HOST:localhost}:8080
          predicates:
            - Path=/api/roles/**, /api/permissions/**
          filters:
            - StripPrefix=1

        - id: document-service-route
          uri: http://${DOCUMENT_SERVICE_HOST:localhost}:8080
          predicates:
            - Path=/api/document/**
          filters:
            - StripPrefix=1

jwt:
  signerKey: ${JWT_SECRET}