version: '3.8'

services:
  # 1. DATABASE: PostgreSQL
  postgres-user:
    image: postgres:15-alpine
    container_name: local-postgres-user
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: user_auth_db
    ports:
      - "5432:5432"

  # 2. DATABASE: MySQL - Port 3306
  mysql-payment:
    image: mysql:8.0
    container_name: local-mysql-payment
    environment:
      MYSQL_ROOT_PASSWORD: admin
      MYSQL_DATABASE: payment_db
    ports:
      - "3306:3306"

  # 3. DATABASE: MySQL - Port 3307
  mysql-document:
    image: mysql:8.0
    container_name: local-mysql-document
    environment:
      MYSQL_ROOT_PASSWORD: admin
      MYSQL_DATABASE: document_db
    ports:
      - "3307:3306"

  # 4. DATABASE: MySQL - Port 3308
  mysql-template:
    image: mysql:8.0
    container_name: local-mysql-template
    environment:
      MYSQL_ROOT_PASSWORD: admin
      MYSQL_DATABASE: template_db
    ports:
      - "3308:3306"

  # 5. STORAGE: MinIO
  minio-storage:
    image: minio/minio
    container_name: local-minio
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: admin123
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"

  # 6. CACHE & RATE LIMIT: Redis
  redis-cache:
    image: redis:7-alpine
    container_name: local-redis
    ports:
      - "6379:6379"

  # 7. MESSAGE BROKER: RabbitMQ
  rabbitmq-broker:
    image: rabbitmq:3-management-alpine
    container_name: local-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"