version: '3.8'

services:
  api-gateway:
    build:
      context: ./api-gateway
    container_name: ai-api-gateway
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
    env_file:
      - .env
    environment:
      - USER_SERVICE_URL=${USER_SERVICE_URL}
      - DOCUMENT_SERVICE_URL=${DOCUMENT_SERVICE_URL}
      - REDIS_URL=${REDIS_URL}
      - JWT_SECRET=${JWT_SIGNER_KEY}
    networks:
      - ai-slide-net

  user-service:
    build:
      context: ./user-service
    container_name: ai-user-service
    ports:
      - "${USER_SERVICE_PORT:-8081}:8081"
    env_file:
      - .env
    environment:
      - DB_URL=${USER_DB_URL}
      - DB_USERNAME=${USER_DB_USERNAME}
      - DB_PASSWORD=${USER_DB_PASSWORD}
      - JWT_SIGNER_KEY=${JWT_SIGNER_KEY}
      - REDIS_URL=${REDIS_URL}
      - RABBIT_HOST=${RABBIT_HOST}
      - RABBIT_PORT=${RABBIT_PORT}
      - RABBIT_USER=${RABBIT_USER}
      - RABBIT_PASS=${RABBIT_PASS}
    networks:
      - ai-slide-net

  document-service:
    build:
      context: ./document-service
    container_name: ai-document-service
    ports:
      - "${DOCUMENT_SERVICE_PORT:-8082}:8082"
    env_file:
      - .env
    environment:
      - DB_URL=${DOC_DB_URL}
      - DB_USERNAME=${DOC_DB_USERNAME}
      - DB_PASSWORD=${DOC_DB_PASSWORD}
      - JWT_SIGNER_KEY=${JWT_SIGNER_KEY}
      - REDIS_URL=${REDIS_URL}
      - RABBIT_HOST=${RABBIT_HOST}
      - RABBIT_PORT=${RABBIT_PORT}
      - RABBIT_USER=${RABBIT_USER}
      - RABBIT_PASS=${RABBIT_PASS}
    networks:
      - ai-slide-net

  notification-service:
    build:
      context: ./notification-service
    container_name: ai-notification-service
    env_file:
      - .env
    environment:
      - RABBIT_HOST=${RABBIT_HOST}
      - RABBIT_PORT=${RABBIT_PORT}
      - RABBIT_USER=${RABBIT_USER}
      - RABBIT_PASS=${RABBIT_PASS}
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
    networks:
      - ai-slide-net

  front-end:
    build:
      context: ./front-end
    container_name: ai-front-end
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    networks:
      - ai-slide-net

networks:
  ai-slide-net:
    driver: bridge